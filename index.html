<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Penari Bali AR – Catherine PCU</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

  <!-- MediaPipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --gold: #c9a227;
      --gold-light: #f0d060;
      --deep: #0a0a0f;
      --crimson: #7b1b1b;
      --glow: rgba(201,162,39,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--deep);
      font-family: 'Lato', sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Splash Screen ── */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, #1a0e00 0%, #000 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    .mandala {
      width: 160px;
      height: 160px;
      animation: spin 20s linear infinite;
      filter: drop-shadow(0 0 18px var(--gold));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #splash h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--gold-light);
      text-shadow: 0 0 30px var(--gold);
      text-align: center;
      line-height: 1.4;
    }
    #splash p {
      font-size: 0.9rem;
      opacity: 0.7;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    #startBtn {
      margin-top: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, var(--gold), var(--crimson));
      border: none;
      border-radius: 50px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 30px var(--glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #startBtn:hover { transform: scale(1.06); box-shadow: 0 0 50px var(--glow); }

    /* ── Main AR Stage ── */
    #stage {
      position: relative;
      width: 100%;
      height: 100dvh;
      display: none;
    }

    video#cam {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    canvas#overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* HUD */
    .hud {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(201,162,39,0.4);
      border-radius: 50px;
      padding: 10px 22px;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .hud-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 8px #2ecc71;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .hud span {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--gold-light);
      text-transform: uppercase;
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 10;
    }
    .top-bar h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.95rem;
      color: var(--gold-light);
      text-shadow: 0 0 12px var(--gold);
    }
    .badge {
      font-size: 0.7rem;
      background: var(--crimson);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.08em;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 50;
      gap: 16px;
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold-light);
    }
    .spinner {
      width: 60px; height: 60px;
      border: 3px solid rgba(201,162,39,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #nopose {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--gold-light);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      font-size: 0.85rem;
      z-index: 5;
    }
    #nopose.show { opacity: 1; }
  </style>
</head>
<body>

/* We generate SVG costumes as Image objects */
function svgToImg(svgStr, w, h) {
  return new Promise(resolve => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image(w, h);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.src = url;
  });
}

function buildSkirtSVG() {
  // Kain tapih prada: wrapped sarong, gold-on-dark diagonal/triangular pattern,
  // crimson lower section, gold border top & bottom, slight A-line shape
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" width="320" height="380">

    <linearGradient id="gs1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9920a"/>

/* ── Landmark indices (MediaPipe Pose 33 pts) ── */
const LM = {
  NOSE:          0,
  L_SHOULDER:   11, R_SHOULDER:  12,
  L_ELBOW:      13, R_ELBOW:     14,
  L_WRIST:      15, R_WRIST:     16,
  L_HIP:        23, R_HIP:       24,
  L_KNEE:       25, R_KNEE:      26,
  L_ANKLE:      27, R_ANKLE:     28,
};

/* ── Helpers ── */
function lm(landmarks, idx) {
  const p = landmarks[idx];
  return { x: canvas.width * (1 - p.x), y: canvas.height * p.y, v: p.visibility };
}

function midpoint(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function angle(a, b) {
  return Math.atan2(b.y - a.y, b.x - a.x);
}

/* ── Draw costume ── */
function drawCostume(landmarks) {
  const lmFn = i => lm(landmarks, i);

  const nose   = lmFn(LM.NOSE);
  const lSh    = lmFn(LM.L_SHOULDER);
  const rSh    = lmFn(LM.R_SHOULDER);
  const lHip   = lmFn(LM.L_HIP);
  const rHip   = lmFn(LM.R_HIP);
  const lElb   = lmFn(LM.L_ELBOW);
  const rElb   = lmFn(LM.R_ELBOW);
  const lWri   = lmFn(LM.L_WRIST);
  const rWri   = lmFn(LM.R_WRIST);
  const lKne   = lmFn(LM.L_KNEE);
  const rKne   = lmFn(LM.R_KNEE);
  const lAnk   = lmFn(LM.L_ANKLE);
  const rAnk   = lmFn(LM.R_ANKLE);

  const shoulderMid = midpoint(lSh, rSh);
  const hipMid      = midpoint(lHip, rHip);
  const kneeMid     = midpoint(lKne, rKne);
  const ankMid      = midpoint(lAnk, rAnk);

  const shoulderW = dist(lSh, rSh);
  const torsoH    = dist(shoulderMid, hipMid);
  const hipW      = dist(lHip, rHip);
  const skirtH    = dist(hipMid, ankMid);
  const torsoAngle = angle(lSh, rSh);

  /* ① SKIRT */
  if (assets.skirt && hipMid.x) {
    ctx.save();
    ctx.translate(hipMid.x, hipMid.y - torsoH * 0.08);
    ctx.rotate(torsoAngle);
    const sw = Math.max(hipW * 2.6, shoulderW * 2.0);
    const sh = skirtH > 60 ? skirtH * 1.12 : torsoH * 1.9;
    ctx.drawImage(assets.skirt, -sw / 2, -8, sw, sh);
    ctx.restore();
  }

  /* ② TOP / TORSO */
  if (assets.top && shoulderMid.x) {
    ctx.save();
    ctx.translate(shoulderMid.x, shoulderMid.y);
    ctx.rotate(torsoAngle);
    const tw = shoulderW * 2.4;
    const th = torsoH * 1.25;
    ctx.drawImage(assets.top, -tw / 2, -th * 0.08, tw, th);
    ctx.restore();
  }

  /* ③ LEFT ARM */
  if (assets.armL && lSh.v > 0.35 && lElb.v > 0.35) {
    const upperLen = dist(lSh, lElb);
    const lowerLen = lWri.v > 0.3 ? dist(lElb, lWri) : upperLen;
    const armWidth = shoulderW * 0.38;
    const armAngle = angle(lSh, lElb);
    ctx.save();
    ctx.translate(lSh.x, lSh.y);
    ctx.rotate(armAngle - Math.PI / 2);
    ctx.drawImage(assets.armL, -armWidth / 2, 0, armWidth, upperLen * 1.05);
    ctx.restore();
    if (lWri.v > 0.3) {
      const lowerAngle = angle(lElb, lWri);
      ctx.save();
      ctx.translate(lElb.x, lElb.y);
      ctx.rotate(lowerAngle - Math.PI / 2);
      ctx.drawImage(assets.armL, -armWidth / 2, 0, armWidth, lowerLen * 1.1);
      ctx.restore();
    }
  }

  /* ④ RIGHT ARM */
  if (assets.armR && rSh.v > 0.35 && rElb.v > 0.35) {
    const rUpperLen = dist(rSh, rElb);
    const rLowerLen = rWri.v > 0.3 ? dist(rElb, rWri) : rUpperLen;
    const rArmWidth = shoulderW * 0.38;
    const rArmAngle = angle(rSh, rElb);
    ctx.save();
    ctx.translate(rSh.x, rSh.y);
    ctx.rotate(rArmAngle - Math.PI / 2);
    ctx.drawImage(assets.armR, -rArmWidth / 2, 0, rArmWidth, rUpperLen * 1.05);
    ctx.restore();
    if (rWri.v > 0.3) {
      const rLowerAngle = angle(rElb, rWri);
      ctx.save();
      ctx.translate(rElb.x, rElb.y);
      ctx.rotate(rLowerAngle - Math.PI / 2);
      ctx.drawImage(assets.armR, -rArmWidth / 2, 0, rArmWidth, rLowerLen * 1.1);
      ctx.restore();
    }
  }

  /* ⑤ CROWN */
  if (assets.crown && nose.x) {
    const headSize = shoulderW * 1.1;
    const crownH   = headSize * 1.4;
    ctx.save();
    ctx.translate(nose.x, nose.y);
    ctx.rotate(torsoAngle);
    ctx.drawImage(assets.crown, -headSize / 2, -crownH * 0.92, headSize, crownH);
    ctx.restore();
  }

  /* ⑥ Golden glow aura */
  const aura = ctx.createRadialGradient(
    shoulderMid.x, shoulderMid.y, shoulderW * 0.3,
    shoulderMid.x, shoulderMid.y, shoulderW * 1.6
  );
  aura.addColorStop(0, 'rgba(201,162,39,0.0)');
  aura.addColorStop(0.7, 'rgba(201,162,39,0.04)');
  aura.addColorStop(1, 'rgba(201,162,39,0.12)');
  ctx.fillStyle = aura;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* ⑦ Floating particle effects */
  drawParticles(shoulderMid);
}

/* ── Particle system ── */
const particles = [];
let lastParticleTime = 0;

function spawnParticle(anchor) {
  particles.push({
    x: anchor.x + (Math.random() - 0.5) * 200,
    y: anchor.y + Math.random() * 100,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -Math.random() * 1.5 - 0.5,
    life: 1,
    size: Math.random() * 4 + 2,
    hue: Math.random() > 0.5 ? '#f5d060' : '#e74c3c'
  });
}

function drawParticles(anchor) {
  const now = Date.now();
  if (now - lastParticleTime > 120) {
    spawnParticle(anchor);
    lastParticleTime = now;
  }

  ctx.save();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.life -= 0.012;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle   = p.hue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

/* ── Forest vignette overlay ── */
function drawForestOverlay() {
  // Dark vignette edges to give "magical forest" feel
  const vg = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.height * 0.25,
    canvas.width / 2, canvas.height / 2, canvas.height * 0.9
  );
  vg.addColorStop(0, 'rgba(0,20,5,0)');
  vg.addColorStop(1, 'rgba(0,20,5,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Green tint on edges
  const tint = ctx.createLinearGradient(0, 0, canvas.width, 0);
  tint.addColorStop(0, 'rgba(0,40,10,0.25)');
  tint.addColorStop(0.3, 'rgba(0,0,0,0)');
  tint.addColorStop(0.7, 'rgba(0,0,0,0)');
  tint.addColorStop(1, 'rgba(0,40,10,0.25)');
  ctx.fillStyle = tint;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ── MediaPipe result handler ── */
function onResults(results) {
  canvas.width  = video.videoWidth  || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawForestOverlay();

  if (results.poseLandmarks && results.poseLandmarks.length > 0) {
    poseDetected = true;
    nopose.classList.remove('show');
    hudText.textContent = 'Penari Bali Aktif ✦';
    drawCostume(results.poseLandmarks);
  } else {
    poseDetected = false;
    nopose.classList.add('show');
    hudText.textContent = 'Mendeteksi tubuh...';
  }

  frameCount++;
}

/* ── Init AR ── */
async function startAR() {
  // Show stage
  document.getElementById('splash').classList.add('hide');
  document.getElementById('stage').style.display = 'block';

  // Load camera
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  }).catch(() =>
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
  );

  video.srcObject = stream;
  await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
  video.play();

  // Load costume SVGs
  [assets.crown, assets.top, assets.skirt, assets.armL, assets.armR] = await Promise.all([
    svgToImg(buildCrownSVG(), 240, 280),
    svgToImg(buildTopSVG(), 320, 230),
    svgToImg(buildSkirtSVG(), 320, 380),
    svgToImg(buildArmSVG(), 90, 230),
    svgToImg(buildArmSVG(), 90, 230),
  ]);

  // Init MediaPipe Pose
  const pose = new Pose({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.55,
    minTrackingConfidence: 0.5,
  });

  pose.onResults(onResults);

  // Camera loop
  const camera = new Camera(video, {
    onFrame: async () => { await pose.send({ image: video }); },
    width: 1280,
    height: 720,
  });

  await camera.start();
  loading.style.display = 'none';
}

/* Resize canvas to match video */
window.addEventListener('resize', () => {
  canvas.width  = video.videoWidth  || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;
});

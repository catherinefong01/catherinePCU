<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Penari Bali AR – Catherine PCU</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

  <!-- MediaPipe Pose -->

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --gold: #c9a227;
      --gold-light: #f0d060;
      --deep: #0a0a0f;
      --crimson: #7b1b1b;
      --glow: rgba(201,162,39,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--deep);
      font-family: 'Lato', sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Splash Screen ── */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, #1a0e00 0%, #000 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    .mandala {
      width: 160px;
      height: 160px;
      animation: spin 20s linear infinite;
      filter: drop-shadow(0 0 18px var(--gold));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #splash h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--gold-light);
      text-shadow: 0 0 30px var(--gold);
      text-align: center;
      line-height: 1.4;
    }
    #splash p {
      font-size: 0.9rem;
      opacity: 0.7;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }

    #startBtn {
      margin-top: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, var(--gold), var(--crimson));
      border: none;
      border-radius: 50px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 30px var(--glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #startBtn:hover { transform: scale(1.06); box-shadow: 0 0 50px var(--glow); }

    /* ── Main AR Stage ── */
    #stage {
      position: relative;
      width: 100%;
      height: 100dvh;
      display: none;
    }

    video#cam {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    canvas#overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* HUD */
    .hud {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(201,162,39,0.4);
      border-radius: 50px;
      padding: 10px 22px;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .hud-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 8px #2ecc71;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .hud span {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--gold-light);
      text-transform: uppercase;
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 10;
    }
    .top-bar h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.95rem;
      color: var(--gold-light);
      text-shadow: 0 0 12px var(--gold);
    }
    .badge {
      font-size: 0.7rem;
      background: var(--crimson);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.08em;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);

      gap: 16px;
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold-light);

    .spinner {

      border-top-color: var(--gold);
      border-radius: 50%;

    #nopose {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--gold-light);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      font-size: 0.85rem;
      z-index: 5;
    }
    #nopose.show { opacity: 1; }
  </style>
</head>

<script>
/* ══════════════════════════════════════════════
   BALI DANCER AR  –  MediaPipe Pose + Canvas 2D
   ══════════════════════════════════════════════ */

const video   = document.getElementById('cam');
const canvas  = document.getElementById('overlay');
const ctx     = canvas.getContext('2d');
const hudText = document.getElementById('hudText');
const nopose  = document.getElementById('nopose');
const loading = document.getElementById('loading');

let poseResults  = null;
let frameCount   = 0;
let poseDetected = false;

/* ── Asset loading ── */
const assets = {};
const toLoad = {
  crown:   buildCrownSVG,
  top:     buildTopSVG,
  skirt:   buildSkirtSVG,
  armL:    buildArmSVG,
  armR:    buildArmSVG,
  forest:  null   // background overlay gradient drawn in-canvas
};

/* We generate SVG costumes as Image objects */
function svgToImg(svgStr, w, h) {
  return new Promise(resolve => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image(w, h);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.src = url;
  });
}

/* ── SVG costume pieces ── */
function buildCrownSVG() {

    <!-- Main crown tower -->
    <polygon points="100,5 130,60 160,40 145,90 175,80 150,120 170,115 140,155 100,145 60,155 30,115 50,120 25,80 55,90 40,40 70,60" 
      fill="url(#gc)" stroke="#c9a227" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Base band -->
    <rect x="30" y="145" width="140" height="28" rx="6" fill="#8b1a1a" stroke="#c9a227" stroke-width="1.5"/>
    <!-- Jewels -->
    <circle cx="100" cy="159" r="8" fill="#e74c3c" stroke="#c9a227" stroke-width="1.5"/>
    <circle cx="65" cy="159" r="5" fill="#3498db" stroke="#c9a227" stroke-width="1"/>
    <circle cx="135" cy="159" r="5" fill="#2ecc71" stroke="#c9a227" stroke-width="1"/>
    <!-- Gold dots -->
    <circle cx="100" cy="30" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="85" cy="55" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="115" cy="55" r="3" fill="#fff" opacity="0.7"/>
    <!-- Side ornaments -->
    <ellipse cx="28" cy="175" rx="18" ry="10" fill="#c9a227" opacity="0.8"/>
    <ellipse cx="172" cy="175" rx="18" ry="10" fill="#c9a227" opacity="0.8"/>
  </svg>`;
}

function buildTopSVG() {

    <defs>

        <rect width="20" height="20" fill="none"/>
        <circle cx="10" cy="10" r="3" fill="rgba(255,220,80,0.3)"/>
        <path d="M0,10 Q5,5 10,10 Q15,15 20,10" stroke="rgba(255,220,80,0.2)" fill="none" stroke-width="1"/>
      </pattern>
    </defs>
    <!-- Body -->
    <path d="M60,10 Q150,-5 240,10 L260,180 Q150,200 40,180 Z" fill="url(#gt)"/>
    <path d="M60,10 Q150,-5 240,10 L260,180 Q150,200 40,180 Z" fill="url(#batik)"/>
    <!-- Border -->
    <path d="M60,10 Q150,-5 240,10 L260,180 Q150,200 40,180 Z" fill="none" stroke="#f5d060" stroke-width="2"/>
    <!-- Collar ornament -->
    <path d="M90,20 Q150,5 210,20 Q190,50 150,55 Q110,50 90,20Z" fill="#8b1a1a" stroke="#c9a227" stroke-width="1.5"/>
    <circle cx="150" cy="35" r="8" fill="#e74c3c" stroke="#f5d060" stroke-width="1.5"/>
    <!-- Horizontal lines decoration -->
    <line x1="55" y1="80" x2="245" y2="80" stroke="#f5d060" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="120" x2="250" y2="120" stroke="#f5d060" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="160" x2="255" y2="160" stroke="#f5d060" stroke-width="1" opacity="0.5"/>
    <!-- Shoulder bands -->
    <rect x="40" y="8" width="30" height="14" rx="4" fill="#8b1a1a" stroke="#c9a227" stroke-width="1"/>
    <rect x="230" y="8" width="30" height="14" rx="4" fill="#8b1a1a" stroke="#c9a227" stroke-width="1"/>

function buildSkirtSVG() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
    <defs>

    </defs>
    <!-- Main skirt -->
    <path d="M80,0 Q150,-8 220,0 L260,300 Q150,320 40,300 Z" fill="url(#gs)"/>
    <path d="M80,0 Q150,-8 220,0 L260,300 Q150,320 40,300 Z" fill="url(#batik2)"/>

    <path d="M42,288 Q150,310 258,288 L260,300 Q150,320 40,300 Z" fill="#c9a227" opacity="0.6"/>
    <!-- Vertical lines -->
    <line x1="110" y1="20" x2="80" y2="300" stroke="#f5d060" stroke-width="0.8" opacity="0.3"/>
    <line x1="150" y1="20" x2="150" y2="305" stroke="#f5d060" stroke-width="0.8" opacity="0.3"/>
    <line x1="190" y1="20" x2="220" y2="300" stroke="#f5d060" stroke-width="0.8" opacity="0.3"/>
    <!-- Front fold -->

function buildArmSVG() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 200" width="80" height="200">
    <defs>
      <linearGradient id="ga" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#d4a017"/>
        <stop offset="100%" stop-color="#8b5e00"/>
      </linearGradient>
      <pattern id="batik3" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
        <circle cx="7" cy="7" r="2" fill="rgba(255,220,80,0.25)"/>
      </pattern>
    </defs>
    <path d="M15,0 Q10,100 20,200 L60,200 Q70,100 65,0 Z" fill="url(#ga)"/>
    <path d="M15,0 Q10,100 20,200 L60,200 Q70,100 65,0 Z" fill="url(#batik3)"/>
    <path d="M15,0 Q10,100 20,200 L60,200 Q70,100 65,0 Z" fill="none" stroke="#f5d060" stroke-width="1.2"/>
    <!-- Bracelet -->
    <rect x="14" y="175" width="52" height="14" rx="5" fill="#8b1a1a" stroke="#c9a227" stroke-width="1.5"/>
    <circle cx="40" cy="182" r="5" fill="#e74c3c" stroke="#f5d060" stroke-width="1"/>
    <!-- Upper band -->
    <rect x="16" y="10" width="48" height="12" rx="4" fill="#8b1a1a" stroke="#c9a227" stroke-width="1"/>
  </svg>`;
}

/* ── Landmark indices (MediaPipe Pose 33 pts) ── */
const LM = {
  NOSE:          0,
  L_SHOULDER:   11, R_SHOULDER:  12,
  L_ELBOW:      13, R_ELBOW:     14,
  L_WRIST:      15, R_WRIST:     16,
  L_HIP:        23, R_HIP:       24,
  L_KNEE:       25, R_KNEE:      26,
  L_ANKLE:      27, R_ANKLE:     28,
};

/* ── Helpers ── */
function lm(landmarks, idx) {
  const p = landmarks[idx];
  return { x: canvas.width * (1 - p.x), y: canvas.height * p.y, v: p.visibility };
}

function midpoint(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function angle(a, b) {
  return Math.atan2(b.y - a.y, b.x - a.x);
}

/* ── Draw costume ── */
function drawCostume(landmarks) {
  const lmFn = i => lm(landmarks, i);

  const nose   = lmFn(LM.NOSE);
  const lSh    = lmFn(LM.L_SHOULDER);
  const rSh    = lmFn(LM.R_SHOULDER);
  const lHip   = lmFn(LM.L_HIP);
  const rHip   = lmFn(LM.R_HIP);
  const lElb   = lmFn(LM.L_ELBOW);
  const rElb   = lmFn(LM.R_ELBOW);
  const lWri   = lmFn(LM.L_WRIST);
  const rWri   = lmFn(LM.R_WRIST);
  const lKne   = lmFn(LM.L_KNEE);
  const rKne   = lmFn(LM.R_KNEE);
  const lAnk   = lmFn(LM.L_ANKLE);
  const rAnk   = lmFn(LM.R_ANKLE);

  const shoulderMid = midpoint(lSh, rSh);
  const hipMid      = midpoint(lHip, rHip);
  const kneeMid     = midpoint(lKne, rKne);
  const ankMid      = midpoint(lAnk, rAnk);

  const shoulderW = dist(lSh, rSh);
  const torsoH    = dist(shoulderMid, hipMid);
  const hipW      = dist(lHip, rHip);
  const skirtH    = dist(hipMid, ankMid);
  const torsoAngle = angle(lSh, rSh);

  /* ① SKIRT */
  if (assets.skirt && hipMid.x) {
    ctx.save();
    ctx.translate(hipMid.x, hipMid.y);
    ctx.rotate(torsoAngle);
    const sw = Math.max(hipW * 2.2, shoulderW * 1.8);
    const sh = skirtH * 1.05;
    ctx.drawImage(assets.skirt, -sw / 2, -10, sw, sh);
    ctx.restore();
  }

  /* ② TOP / TORSO */
  if (assets.top && shoulderMid.x) {
    ctx.save();
    ctx.translate(shoulderMid.x, shoulderMid.y);
    ctx.rotate(torsoAngle);
    const tw = shoulderW * 2.1;
    const th = torsoH * 1.15;
    ctx.drawImage(assets.top, -tw / 2, -th * 0.1, tw, th);
    ctx.restore();
  }

  /* ③ LEFT ARM */
  if (assets.armL && lSh.v > 0.4 && lElb.v > 0.4) {
    const armLen = dist(lSh, lElb) + dist(lElb, lWri);
    const armAngle = angle(lSh, lElb);
    ctx.save();
    ctx.translate(lSh.x, lSh.y);
    ctx.rotate(armAngle - Math.PI / 2);
    ctx.drawImage(assets.armL, -20, 0, 40, armLen);
    ctx.restore();
  }

  /* ④ RIGHT ARM */
  if (assets.armR && rSh.v > 0.4 && rElb.v > 0.4) {
    const armLen = dist(rSh, rElb) + dist(rElb, rWri);
    const armAngle = angle(rSh, rElb);
    ctx.save();
    ctx.translate(rSh.x, rSh.y);
    ctx.rotate(armAngle - Math.PI / 2);
    ctx.drawImage(assets.armR, -20, 0, 40, armLen);
    ctx.restore();
  }

  /* ⑤ CROWN */
  if (assets.crown && nose.x) {
    const headSize = shoulderW * 0.9;
    const crownH   = headSize * 1.1;
    ctx.save();
    ctx.translate(nose.x, nose.y);
    ctx.rotate(torsoAngle);
    ctx.drawImage(assets.crown, -headSize / 2, -crownH * 1.05, headSize, crownH);
    ctx.restore();
  }

  /* ⑥ Golden glow aura */
  const aura = ctx.createRadialGradient(
    shoulderMid.x, shoulderMid.y, shoulderW * 0.3,
    shoulderMid.x, shoulderMid.y, shoulderW * 1.6
  );
  aura.addColorStop(0, 'rgba(201,162,39,0.0)');
  aura.addColorStop(0.7, 'rgba(201,162,39,0.04)');
  aura.addColorStop(1, 'rgba(201,162,39,0.12)');
  ctx.fillStyle = aura;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* ⑦ Floating particle effects */
  drawParticles(shoulderMid);
}

/* ── Particle system ── */
const particles = [];
let lastParticleTime = 0;

function spawnParticle(anchor) {
  particles.push({
    x: anchor.x + (Math.random() - 0.5) * 200,
    y: anchor.y + Math.random() * 100,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -Math.random() * 1.5 - 0.5,
    life: 1,
    size: Math.random() * 4 + 2,
    hue: Math.random() > 0.5 ? '#f5d060' : '#e74c3c'
  });
}

function drawParticles(anchor) {
  const now = Date.now();
  if (now - lastParticleTime > 120) {
    spawnParticle(anchor);
    lastParticleTime = now;
  }

  ctx.save();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.life -= 0.012;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle   = p.hue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

/* ── Forest vignette overlay ── */
function drawForestOverlay() {
  // Dark vignette edges to give "magical forest" feel
  const vg = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.height * 0.25,
    canvas.width / 2, canvas.height / 2, canvas.height * 0.9
  );
  vg.addColorStop(0, 'rgba(0,20,5,0)');
  vg.addColorStop(1, 'rgba(0,20,5,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Green tint on edges
  const tint = ctx.createLinearGradient(0, 0, canvas.width, 0);
  tint.addColorStop(0, 'rgba(0,40,10,0.25)');
  tint.addColorStop(0.3, 'rgba(0,0,0,0)');
  tint.addColorStop(0.7, 'rgba(0,0,0,0)');
  tint.addColorStop(1, 'rgba(0,40,10,0.25)');
  ctx.fillStyle = tint;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ── MediaPipe result handler ── */
function onResults(results) {
  canvas.width  = video.videoWidth  || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawForestOverlay();

  if (results.poseLandmarks && results.poseLandmarks.length > 0) {
    poseDetected = true;
    nopose.classList.remove('show');
    hudText.textContent = 'Penari Bali Aktif ✦';
    drawCostume(results.poseLandmarks);
  } else {
    poseDetected = false;
    nopose.classList.add('show');
    hudText.textContent = 'Mendeteksi tubuh...';
  }

  frameCount++;
}

/* ── Init AR ── */
async function startAR() {
  // Show stage
  document.getElementById('splash').classList.add('hide');
  document.getElementById('stage').style.display = 'block';

  // Load camera
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  }).catch(() =>
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
  );

  video.srcObject = stream;
  await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
  video.play();

  // Load costume SVGs
  [assets.crown, assets.top, assets.skirt, assets.armL, assets.armR] = await Promise.all([
    svgToImg(buildCrownSVG(), 200, 220),
    svgToImg(buildTopSVG(), 300, 200),
    svgToImg(buildSkirtSVG(), 300, 320),
    svgToImg(buildArmSVG(), 80, 200),
    svgToImg(buildArmSVG(), 80, 200),
  ]);

  // Init MediaPipe Pose
  const pose = new Pose({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.55,
    minTrackingConfidence: 0.5,
  });

  pose.onResults(onResults);

  // Camera loop
  const camera = new Camera(video, {
    onFrame: async () => { await pose.send({ image: video }); },
    width: 1280,
    height: 720,
  });

  await camera.start();
  loading.style.display = 'none';
}

/* Resize canvas to match video */
window.addEventListener('resize', () => {
  canvas.width  = video.videoWidth  || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;
});
</script>
